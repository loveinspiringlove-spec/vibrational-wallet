<style>
  :root {
    --gold:          #D4A853;
    --gold-light:    #ECC87E;
    --gold-glow:     rgba(212,168,83,0.45);
    --gold-dim:      #A8793A;
    --grad-1: #3D0D5E;
    --grad-2: #480A52;
    --grad-3: #4A0040;
    --grad-4: #2A0838;
    --plum-rose:     #7A1060;
    --dusty-mauve:   #DDB8D8;
    --aubergine:     #2E0A30;
    --on-dark-body:  #F0E8FF;
    --on-dark-title: var(--gold-light);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--grad-4);
    min-height: 100%;
    font-family: 'Cormorant Garamond', serif;
    color: var(--on-dark-body);
    overflow-x: hidden;
  }

  body {
    background: linear-gradient(145deg,
      #3D0D5E 0%,
      #480A52 28%,
      #4A0040 62%,
      #2A0838 100%);
    min-height: 100vh;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 80% 45% at 50% 0%, rgba(90,20,110,0.35) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 30%, rgba(74,0,64,0.3) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 95%, rgba(42,8,56,0.5) 0%, transparent 55%);
    pointer-events: none; z-index: 0;
  }

  .container {
    max-width: 600px; margin: 0 auto;
    padding: 0 18px 60px; position: relative; z-index: 1;
  }

  /* ── HEADER — matches brand site exactly ── */
  .header { text-align: center; margin-bottom: 6px; animation: fadeDown 0.9s ease both; padding-top: 14px; }
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* top nav bar: ✦  THE ART OF DIVINE ALIGNMENT  ✦ */
  .brand-nav {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    margin-bottom: 0;
    padding: 10px 0;
    border-top: 1px solid rgba(212,168,83,0.28);
    border-bottom: 1px solid rgba(212,168,83,0.28);
  }
  .brand-nav-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(11px, 2.4vw, 13px);
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--dusty-mauve);
  }
  .brand-nav-star {
    color: var(--gold-light); font-size: 12px;
    text-shadow: 0 0 8px var(--gold-glow);
  }

  /* "THE ART OF" small line above title */
  .header-pre {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(11px, 2.5vw, 14px);
    letter-spacing: 6px;
    text-transform: uppercase;
    color: var(--dusty-mauve);
    margin-bottom: 2px;
  }

  /* Large two-line title: Divine / Alignment */
  .header-title-wrap {
    margin-bottom: 14px;
    line-height: 1.05;
  }
  .header-title-plain {
    display: block;
    font-family: 'Playfair Display', serif;
    font-size: clamp(30px, 7.5vw, 48px);
    font-weight: 400;
    color: var(--gold-light);
    text-shadow: 0 0 50px var(--gold-glow);
    letter-spacing: 1px;
  }
  .header-title-italic {
    display: block;
    font-family: 'Playfair Display', serif;
    font-size: clamp(30px, 7.5vw, 48px);
    font-weight: 400;
    font-style: italic;
    color: var(--gold-light);
    text-shadow: 0 0 50px var(--gold-glow);
    letter-spacing: 1px;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(34px, 8.5vw, 54px);
    font-weight: 400;
    color: var(--gold-light);
    text-shadow: 0 0 50px var(--gold-glow), 0 2px 4px rgba(0,0,0,0.3);
    letter-spacing: 1px;
    margin-bottom: 0;
    white-space: nowrap;
  }

  /* cohesive gold line — close under title */
  .header-divider {
    width: 52%; height: 1px;
    margin: 8px auto 12px;
    background: linear-gradient(to right, transparent, rgba(212,168,83,0.7) 30%, rgba(212,168,83,0.7) 70%, transparent);
  }

  /* italic tagline body */
  .subtitle {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(16px, 4vw, 20px);
    font-style: italic;
    font-weight: 300;
    color: var(--on-dark-body);
    line-height: 1.6;
    margin-bottom: 4px;
  }

  /* secondary tagline */
  .header-tagline {
    font-size: 15px; font-style: italic;
    color: var(--dusty-mauve); font-weight: 300;
    margin-top: 8px; opacity: 0.85;
  }



  /* ── FLOWER OF LIFE ── */
  .fol-wrap {
    position: absolute;
    left: 50%;
    top: 0px;
    transform: translateX(-50%);
    opacity: 0.18;
    pointer-events: none;
    z-index: 0;
  }

  /* ── BILL ANIMATIONS ── */
  @keyframes borderGlow {
    0%   { box-shadow: 0 0 0 2px rgba(212,168,83,0.12), 0 16px 30px rgba(0,0,0,0.85), inset 0 0 28px rgba(212,168,83,0.06); border-color: rgba(212,168,83,0.65); }
    25%  { box-shadow: 0 0 0 3px rgba(212,168,83,0.3), 0 16px 30px rgba(0,0,0,0.85), inset 0 0 36px rgba(212,168,83,0.10); border-color: rgba(236,200,126,0.95); }
    50%  { box-shadow: 0 0 0 2px rgba(212,168,83,0.12), 0 16px 30px rgba(0,0,0,0.85), inset 0 0 28px rgba(212,168,83,0.06); border-color: rgba(212,168,83,0.65); }
    75%  { box-shadow: 0 0 0 3px rgba(212,168,83,0.22), 0 16px 30px rgba(0,0,0,0.85), inset 0 0 32px rgba(212,168,83,0.08); border-color: rgba(222,182,110,0.9); }
    100% { box-shadow: 0 0 0 2px rgba(212,168,83,0.12), 0 16px 30px rgba(0,0,0,0.85), inset 0 0 28px rgba(212,168,83,0.06); border-color: rgba(212,168,83,0.65); }
  }
  @keyframes spendGlow {
    0%   { box-shadow: 0 0 0 2px rgba(212,168,83,0.12), 0 16px 30px rgba(0,0,0,0.85), inset 0 0 28px rgba(212,168,83,0.06); border-color: rgba(212,168,83,0.65); }
    20%  { box-shadow: 0 0 0 8px rgba(212,168,83,0.55), 0 16px 30px rgba(0,0,0,0.85), inset 0 0 60px rgba(212,168,83,0.18); border-color: rgba(240,210,140,1); }
    50%  { box-shadow: 0 0 0 4px rgba(212,168,83,0.3), 0 16px 30px rgba(0,0,0,0.85), inset 0 0 40px rgba(212,168,83,0.12); border-color: rgba(230,195,130,0.95); }
    100% { box-shadow: 0 0 0 2px rgba(212,168,83,0.12), 0 16px 30px rgba(0,0,0,0.85), inset 0 0 28px rgba(212,168,83,0.06); border-color: rgba(212,168,83,0.65); }
  }
  .bill.spending { animation: spendGlow 1.8s ease-out forwards !important; }

  /* Vignette — lighter so it doesn't bleed past bill border */
  .bill-shimmer {
    position: absolute; inset: 0; border-radius: 10px;
    background: radial-gradient(ellipse 72% 62% at 50% 50%,
      transparent 30%, rgba(15,0,22,0.14) 65%, rgba(15,0,22,0.32) 100%);
    pointer-events: none; z-index: 3;
  }

  /* Gold streak — more breathing room below denomination */
  .bill-seal {
    width: 32%; height: 1px; margin: 10px auto 0;
    background: linear-gradient(to right,
      transparent 0%,
      rgba(236,200,126,0.5) 20%,
      rgba(255,230,140,0.8) 50%,
      rgba(236,200,126,0.5) 80%,
      transparent 100%);
  }

  /* ── BILL ── */
  .bill-wrapper { perspective: 1000px; margin-bottom: 4px; animation: fadeUp 1s ease 0.2s both; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .bill {
    width: 88%; max-width: 420px; margin: 0 auto; aspect-ratio: 2.5 / 1;
    background: linear-gradient(145deg, #4A0A42 0%, #5E1052 25%, #6A1258 50%, #5E1052 75%, #4A0A42 100%);
    border-radius: 2px; border: 2px solid rgba(212,168,83,0.72);
    box-shadow: 0 0 0 2px rgba(212,168,83,0.12), 0 16px 30px rgba(0,0,0,0.85), inset 0 0 28px rgba(212,168,83,0.06);
    position: relative; overflow: hidden; cursor: pointer;
    transition: transform 0.4s ease; display: block;
    animation: borderGlow 3s ease-in-out infinite;
  }
  .bill:hover {
    box-shadow: 0 0 0 5px rgba(212,168,83,0.28), 0 20px 40px rgba(0,0,0,0.9), inset 0 0 40px rgba(74,0,64,0.3);
  }
  .bill::before {
    content: ''; position: absolute; inset: 7px;
    border: 1px solid rgba(212,168,83,0.35); border-radius: 1px;
    pointer-events: none; z-index: 1;
  }
  .bill::after {
    content: ''; position: absolute; inset: 0;
    background-image:
      repeating-linear-gradient(0deg,  transparent, transparent 4px, rgba(255,255,255,0.018) 4px, rgba(255,255,255,0.018) 5px),
      repeating-linear-gradient(90deg, transparent, transparent 4px, rgba(255,255,255,0.013) 4px, rgba(255,255,255,0.013) 5px);
    border-radius: 2px; pointer-events: none; z-index: 0;
  }
  .bill-content {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 0; z-index: 2;
    padding: 8px 0 4px;
  }

  .bill-amount-star {
    font-size: clamp(9px, 1.8vw, 12px);
    color: rgba(236,200,126,0.75);
    text-shadow: 0 0 10px rgba(212,168,83,0.6);
    align-self: center;
    margin-left: 8px;
    margin-bottom: 0.1em;
  }

  /* ── BILL CORNERS ── */
  .bill-corner {
    position: absolute;
    font-size: 8px;
    color: rgba(236,200,126,0.5);
    text-shadow: 0 0 6px rgba(212,168,83,0.4);
    z-index: 4;
    line-height: 1;
  }
  .bill-corner-tl { top: 12px;  left: 14px;  }
  .bill-corner-tr { top: 12px;  right: 14px; }
  .bill-corner-bl { bottom: 12px; left: 14px;  }
  .bill-corner-br { bottom: 12px; right: 14px; }

  /* tagline ABOVE */
  .bill-tagline-above {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(8px, 1.9vw, 13px);
    letter-spacing: 6px;
    color: rgba(236,200,126,0.95);
    text-transform: uppercase;
    text-shadow: 0 1px 6px rgba(0,0,0,0.55);
    margin-top: -4px;
    margin-bottom: 0;
  }

  /* denomination — fixed height, raised toward star */
  .bill-denomination {
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    height: clamp(60px, 16vw, 104px);
    margin-top: -4px;
    transition: opacity 0.3s ease;
  }
  .bill-dollar {
    font-family: 'Playfair Display', serif;
    font-size: clamp(34px, 8.5vw, 54px);
    color: var(--gold-light); font-weight: 400;
    text-shadow: 0 0 20px rgba(212,168,83,0.35);
    align-self: center;
    margin-bottom: 0.2em;
    margin-right: 2px;
    opacity: 0.9;
  }
  .bill-number {
    font-family: 'Playfair Display', serif;
    font-size: clamp(54px, 15vw, 96px);
    color: var(--gold-light); font-weight: 600;
    letter-spacing: -1px;
    line-height: 1;
    display: inline-block;
    vertical-align: middle;
    text-shadow: 0 1px 0 rgba(212,168,83,0.45), 0 0 30px rgba(212,168,83,0.38), 0 -1px 0 rgba(0,0,0,0.3);
  }

  .bill-note {
    text-align: center; margin-top: 22px; font-size: 13px; letter-spacing: 1px;
    color: var(--dusty-mauve); font-style: italic; opacity: 1;
  }

  /* ── DAILY INTENTION ── */
  .intention-section {
    text-align: center; margin-bottom: 8px; margin-top: 18px;
    animation: fadeUp 1s ease 0.28s both;
    padding: 10px 0 4px;
    border-top: 1px solid rgba(212,168,83,0.1);
    border-bottom: 1px solid rgba(212,168,83,0.1);
  }
  .intention-label {
    font-size: 9px; letter-spacing: 3px; text-transform: uppercase;
    color: var(--dusty-mauve); opacity: 0.7; margin-bottom: 10px;
  }
  .intention-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px; font-style: italic; font-weight: 300;
    color: var(--on-dark-body); line-height: 1.6;
    padding: 0 20px;
  }
  .intention-star {
    color: var(--gold-light); font-size: 10px;
    display: block; margin-top: 10px;
    text-shadow: 0 0 8px var(--gold-glow);
    opacity: 0.7;
  }

  /* ── COUNTER ── */


  /* ── PROMPT CARD ── */
  .prompt-section { margin-bottom: 14px; animation: fadeUp 1s ease 0.45s both; }
  .prompt-card {
    background: linear-gradient(135deg, rgba(74,0,64,0.6) 0%, rgba(61,13,94,0.48) 100%);
    border: 1px solid rgba(212,168,83,0.28); border-radius: 14px; padding: 22px 24px 18px;
  }
  .gold-diamond { color: var(--gold-light); }
  .tagline-star {
    color: var(--gold-light); font-size: 9px;
    opacity: 0.7; vertical-align: middle;
    text-shadow: 0 0 6px var(--gold-glow);
  }
  .spend-label {
    font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
    color: var(--dusty-mauve); margin-bottom: 12px;
  }
  .spend-row { display: flex; gap: 8px; align-items: stretch; }
  .spend-input {
    flex: 1; background: rgba(46,10,48,0.55); border: 1px solid rgba(212,168,83,0.26);
    border-radius: 10px; padding: 12px 16px; font-family: 'Cormorant Garamond', serif;
    font-size: 17px; color: var(--on-dark-body); caret-color: var(--gold-light);
    outline: none; resize: none; height: 90px; transition: border-color 0.25s, box-shadow 0.25s;
    line-height: 1.4; vertical-align: top; display: block;
  }
  .spend-input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(212,168,83,0.13); }
  .spend-input::placeholder { color: rgba(221,184,216,0.65); font-style: italic; }
  .spend-btn {
    background: linear-gradient(160deg, #F0CC7A 0%, #D4A853 40%, #B8843A 100%);
    border: 1px solid rgba(240,204,122,0.4);
    border-radius: 12px; padding: 0 28px; height: 90px;
    font-family: 'Playfair Display', serif; font-size: 19px; color: #2E0A30;
    cursor: pointer; font-weight: 600; white-space: nowrap; flex-shrink: 0;
    box-shadow: 0 4px 18px rgba(212,168,83,0.35), inset 0 1px 0 rgba(255,240,180,0.4);
    transition: transform 0.18s, box-shadow 0.18s, filter 0.18s;
    letter-spacing: 0.3px;
    min-width: 130px;
  }
  .spend-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(212,168,83,0.55), inset 0 1px 0 rgba(255,240,180,0.4); filter: brightness(1.06); }
  .spend-btn:active { transform: translateY(1px); box-shadow: 0 2px 10px rgba(212,168,83,0.3); }

  /* ── AMOUNT FIELD ── */
  /* amount pill styles moved to amount-row-full above */

  /* ── AMOUNT ROW FULL WIDTH ── */
  .amount-row-full {
    margin-top: 16px;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
  }
  .amount-field-label-full {
    font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
    color: var(--dusty-mauve); opacity: 0.8;
  }
  .amount-pill-full {
    display: flex; align-items: baseline;
    background: rgba(46,10,48,0.6);
    border: 1.5px solid rgba(212,168,83,0.55);
    border-radius: 28px; padding: 12px 28px;
    gap: 0; width: 100%;
    justify-content: center;
    align-items: center;
    box-shadow: 0 0 0 1px rgba(212,168,83,0.12), 0 4px 16px rgba(0,0,0,0.3);
    cursor: text;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .amount-pill-full:focus-within {
    border-color: rgba(212,168,83,0.85);
    box-shadow: 0 0 0 3px rgba(212,168,83,0.15), 0 4px 16px rgba(0,0,0,0.3);
  }
  .amount-prefix-full {
    font-family: 'Playfair Display', serif; font-size: 28px;
    color: var(--gold-light); line-height: 1; margin-bottom: 0.1em;
    margin-right: 3px;
    text-shadow: 0 0 16px var(--gold-glow);
  }
  .amount-input-full {
    background: transparent; border: none; padding: 0;
    font-size: 32px; color: var(--gold-light);
    caret-color: var(--gold-light);
    font-family: 'Playfair Display', serif;
    width: 5ch; outline: none; text-align: center;
    text-shadow: 0 0 16px var(--gold-glow);
    min-width: 3ch; max-width: 8ch;
  }

  /* ── INLINE COUNTER ── */
  .counter-inline {
    margin-top: 18px; text-align: center;
    padding-top: 16px;
    border-top: 1px solid rgba(212,168,83,0.12);
  }
  .counter-inline-label {
    font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
    color: var(--dusty-mauve); display: block; margin-bottom: 4px;
  }
  .counter-inline-amount {
    font-family: 'Playfair Display', serif; font-size: 36px;
    color: var(--gold-light); text-shadow: 0 0 28px var(--gold-glow);
    line-height: 1; display: flex; align-items: baseline; justify-content: center;
  }
  .counter-inline-amount .counter-dollar { font-size: 20px; margin-bottom: 0.1em; }

  /* ── TADA BUBBLE ── */
  .tada-bubble {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(0.5);
    z-index: 1000;
    background: linear-gradient(135deg, rgba(74,0,64,0.95) 0%, rgba(61,13,94,0.95) 100%);
    border: 1.5px solid rgba(212,168,83,0.8);
    border-radius: 20px;
    padding: 28px 36px;
    text-align: center;
    box-shadow: 0 0 0 1px rgba(212,168,83,0.2), 0 20px 60px rgba(0,0,0,0.7), 0 0 40px rgba(212,168,83,0.25);
    opacity: 0;
    pointer-events: none;
    transition: none;
  }
  .tada-bubble.show {
    animation: tadaPop 2.8s cubic-bezier(0.34,1.56,0.64,1) forwards;
  }
  @keyframes tadaPop {
    0%   { opacity: 0; transform: translate(-50%,-50%) scale(0.5); }
    15%  { opacity: 1; transform: translate(-50%,-50%) scale(1.05); }
    25%  { transform: translate(-50%,-50%) scale(0.97); }
    35%  { transform: translate(-50%,-50%) scale(1); }
    70%  { opacity: 1; transform: translate(-50%,-50%) scale(1); }
    100% { opacity: 0; transform: translate(-50%,-50%) scale(0.95); }
  }
  .tada-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(28px, 7vw, 40px);
    color: var(--gold-light);
    font-weight: 400;
    text-shadow: 0 0 30px var(--gold-glow);
    margin-bottom: 6px;
  }
  .tada-sub {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(15px, 3.5vw, 19px);
    font-style: italic; font-weight: 300;
    color: var(--on-dark-body);
    opacity: 0.9; line-height: 1.5;
  }
  .tada-star {
    color: var(--gold-light); font-size: 12px;
    letter-spacing: 6px; display: block;
    margin-top: 10px; opacity: 0.7;
  }

  /* ── GOLDEN DUST ── */
  .coin-burst { position: fixed; pointer-events: none; z-index: 999; }
  .dust {
    position: absolute; border-radius: 50%;
    background: radial-gradient(circle, #F2D890 0%, #D4A853 45%, #A8793A 100%);
    animation: dustFly var(--fly-dur) cubic-bezier(0.25,0.46,0.45,0.94) both;
    box-shadow: 0 0 var(--glow) rgba(212,168,83,0.88);
  }
  @keyframes dustFly {
    0%   { opacity: 1; transform: translate(0,0) scale(1); }
    70%  { opacity: 0.6; }
    100% { opacity: 0; transform: translate(var(--dx),var(--dy)) scale(0.1); }
  }

</style>
</head>
<body>

<div class="container">

  <!-- Flower of Life — behind header -->
  <div class="fol-wrap">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="380" height="380">
      <g fill="none" stroke="#D4A853" stroke-width="0.7">
        <circle cx="150" cy="150" r="33"/>
        <circle cx="150" cy="117" r="33"/>
        <circle cx="150" cy="183" r="33"/>
        <circle cx="178.6" cy="133.5" r="33"/>
        <circle cx="178.6" cy="166.5" r="33"/>
        <circle cx="121.4" cy="133.5" r="33"/>
        <circle cx="121.4" cy="166.5" r="33"/>
        <circle cx="150" cy="84" r="33"/>
        <circle cx="150" cy="216" r="33"/>
        <circle cx="207.1" cy="117" r="33"/>
        <circle cx="207.1" cy="183" r="33"/>
        <circle cx="92.9" cy="117" r="33"/>
        <circle cx="92.9" cy="183" r="33"/>
        <circle cx="150" cy="150" r="66"/>
        <circle cx="150" cy="150" r="99"/>
      </g>
    </svg>
  </div>

  <!-- Brand nav bar -->
  <div class="brand-nav">
    <span class="brand-nav-star">✦</span>
    <span class="brand-nav-text">The Art of Divine Alignment</span>
    <span class="brand-nav-star">✦</span>
  </div>

  <div class="header">
    <h1>Vibrational Wallet</h1>
    <div class="header-divider"></div>
    <p class="header-tagline"><span class="tagline-star">✦</span> this money always replenishes <span class="tagline-star">✦</span></p>
  </div>
  <div class="bill-wrapper">
    <div class="bill" id="bill">
      <div class="bill-shimmer"></div>
      <!-- Corner ornaments -->
      <div class="bill-corner bill-corner-tl">✦</div>
      <div class="bill-corner bill-corner-tr">✦</div>
      <div class="bill-corner bill-corner-bl">✦</div>
      <div class="bill-corner bill-corner-br">✦</div>
      <div class="bill-content">
        <div class="bill-tagline-above">Divine Abundance</div>
        <div class="bill-denomination" id="billAmount"><span class="bill-dollar">$</span><span class="bill-number">111</span><span class="bill-amount-star">✦</span></div>
        <div class="bill-seal"></div>
      </div>
    </div>
  </div>

  <div class="intention-section">
    <div class="intention-label">today's intention</div>
    <div class="intention-text" id="intentionText"></div>
    <span class="intention-star">✦</span>
  </div>

  <div class="prompt-section">
    <div class="prompt-card">
      <div class="spend-row">
        <textarea class="spend-input" id="spendInput" placeholder="What would you love to spend this on?" rows="3"></textarea>
        <button class="spend-btn" id="spendBtn">Spend it ✦</button>
      </div>

      <!-- Amount pill — prominent, below textarea -->
      <div class="amount-row-full">
        <div class="amount-field-label-full">enter $ amount</div>
        <div class="amount-pill-full">
          <span class="amount-prefix-full">$</span>
          <input class="amount-input-full" id="amountInput" type="number" min="1" value="111" />
        </div>
      </div>
      </div>
    </div>
  </div>

  <div class="page-attribution">
Inspired by the Wallet Process · The Art of Divine Alignment
  </div>

</div>

<!-- TADA bubble -->
<div class="tada-bubble" id="tadaBubble">
  <div class="tada-title">✦ It's Yours ✦</div>
  <div class="tada-sub">Released into the flow.<br>Consider it done.</div>
  <span class="tada-star">✦ &nbsp; ✦ &nbsp; ✦</span>
</div>

<script>
// Ceremony mode — no purchase tracking
let currentDenom = 111;


// Daily intention phrases
const INTENTIONS = [
  "Money flows to me easily and joyfully.",
  "I am a vibrational match to abundance.",
  "The Universe delights in providing for me.",
  "I receive with grace and appreciation.",
  "Prosperity is my natural state of being.",
  "Every dollar I spend returns multiplied.",
  "I am open to infinite streams of income.",
  "Abundance is always flowing to me.",
  "I welcome financial freedom.",
  "The more I appreciate, the more I receive.",
  "Money is energy and I welcome its flow.",
  "I am aligned with the frequency of wealth.",
  "My desires are valid and always fulfilled.",
  "I trust the Universe to provide for me.",
  "Spending is giving energy permission to flow."
];

function setDailyIntention() {
  // Seed by day so it changes daily but stays consistent within a day
  const dayNum = Math.floor(Date.now() / 86400000);
  const phrase = INTENTIONS[dayNum % INTENTIONS.length];
  const el = document.getElementById('intentionText');
  if (el) el.textContent = phrase;
}

// Denomination cycle on bill tap
const DENOMS = [11, 33, 55, 111, 333, 555];
const DENOM_LABELS = {11:'11', 33:'33', 55:'55', 111:'111', 333:'333', 555:'555'};
let denomIndex = 3;

document.getElementById('bill').addEventListener('click', () => {
  const hint = document.getElementById('tapHint');
  if (hint) { hint.style.animation = 'none'; hint.style.opacity = '0'; }
  denomIndex = (denomIndex + 1) % DENOMS.length;
  currentDenom = DENOMS[denomIndex];
  const billAmt = document.getElementById('billAmount');
  billAmt.style.opacity = '0';
  setTimeout(() => {
    billAmt.querySelector('.bill-number').textContent = DENOM_LABELS[currentDenom];
    billAmt.style.opacity = '1';
  }, 150);
  document.getElementById('amountInput').value = currentDenom;
  // brief border flash
  const bill = document.getElementById('bill');
  bill.style.borderColor = 'rgba(236,200,126,0.95)';
  setTimeout(() => { bill.style.borderColor = ''; }, 400);
  // haptic
  if (navigator.vibrate) navigator.vibrate(30);
});



function coinBurst(x,y) {

  const b=document.createElement('div'); b.className='coin-burst';
  b.style.cssText=`left:${x}px;top:${y}px`; document.body.appendChild(b);
  for(let i=0;i<90;i++){
    const c=document.createElement('div'); c.className='dust';
    const isBig=i<16,isMed=i<36;
    const size=isBig?(16+Math.random()*18):isMed?(6+Math.random()*8):(2+Math.random()*4);
    const ang=Math.random()*360,dist=isBig?(150+Math.random()*220):isMed?(80+Math.random()*160):(30+Math.random()*120);
    const rad=ang*Math.PI/180,dx=Math.cos(rad)*dist,dy=Math.sin(rad)*dist-Math.abs(Math.sin(rad)*dist*0.3);
    c.style.cssText=[`width:${size.toFixed(1)}px`,`height:${size.toFixed(1)}px`,`--dx:${dx.toFixed(1)}px`,`--dy:${dy.toFixed(1)}px`,`--fly-dur:${(1+Math.random()*1.2).toFixed(2)}s`,`--glow:${isBig?'8px':isMed?'4px':'2px'}`,`animation-delay:${(Math.random()*0.25).toFixed(2)}s`,`opacity:${(0.75+Math.random()*0.25).toFixed(2)}`].join(';');
    b.appendChild(c);
  }
  setTimeout(()=>b.remove(),2800);
}




const bill=document.getElementById('bill');
bill.addEventListener('mousemove',e=>{
  const r=bill.getBoundingClientRect();
  bill.style.transform=`rotateX(${((e.clientY-r.top-r.height/2)/r.height)*-7}deg) rotateY(${((e.clientX-r.left-r.width/2)/r.width)*7}deg) scale(1.015)`;
});
bill.addEventListener('mouseleave',()=>{bill.style.transform='';});

setDailyIntention();
const logDateEl = document.getElementById('logDate');
if(logDateEl) logDateEl.textContent = new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});
else{document.getElementById('billAmount').querySelector('.bill-number').textContent='111';}
</script>
</body>
</html>
