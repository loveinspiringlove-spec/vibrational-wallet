    <rect width="180" height="180" rx="40" fill="url(#goldbg)"/>
    <rect width="180" height="180" rx="40" fill="none" stroke="#3D0D5E" stroke-width="1.5" opacity="0.5"/>
    <g transform="translate(90,90)" filter="url(#glow3)" stroke="#3D0D5E" fill="none">
