<svg width="512" height="512" viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="goldbg" cx="50%" cy="45%" r="75%">
        <stop offset="0%" style="stop-color:#e8c372"/>
        <stop offset="100%" style="stop-color:#9a6808"/>
