<!DOCTYPE html>
<html>
<head><meta charset="UTF-8">
<style>
  body { background: #1a0a2e; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; font-family: Georgia, serif; gap: 20px; }
  .label { color: rgba(200,160,192,0.7); font-size: 12px; letter-spacing: 3px; text-transform: uppercase; }
  .icon-wrap { filter: drop-shadow(0 8px 28px rgba(212,168,83,0.45)); }
</style>
</head>
<body>
<div class="label">Home Screen Icon</div>
<div class="icon-wrap"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5A1050"/><stop offset="40%" stop-color="#480A52"/>
      <stop offset="70%" stop-color="#4A0040"/><stop offset="100%" stop-color="#2A0838"/>
    </linearGradient>
    <linearGradient id="billg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4A0A42"/><stop offset="50%" stop-color="#6A1258"/><stop offset="100%" stop-color="#4A0A42"/>
    </linearGradient>
    <linearGradient id="gb" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ECC87E"/><stop offset="50%" stop-color="#D4A853"/><stop offset="100%" stop-color="#A8793A"/>
    </linearGradient>
    <linearGradient id="gt" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F8E090"/><stop offset="50%" stop-color="#D4A853"/><stop offset="100%" stop-color="#A8793A"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="180" height="180" rx="38" fill="url(#bg)"/>
  <rect x="14" y="46" width="152" height="88" rx="10" fill="url(#billg)"/>
  <rect x="14" y="46" width="152" height="88" rx="10" fill="none" stroke="url(#gb)" stroke-width="2" opacity="0.85"/>
  <rect x="21" y="53" width="138" height="74" rx="7" fill="none" stroke="url(#gb)" stroke-width="0.8" opacity="0.45"/>
  <text x="90" y="112" font-family="Georgia, serif" font-size="74" font-weight="100"
        fill="url(#gt)" text-anchor="middle" filter="url(#glow)">$</text>
</svg></div>
<div class="label" style="font-size:11px;opacity:0.5;">180 × 180px · Vibrational Wallet</div>
</body>
</html>
