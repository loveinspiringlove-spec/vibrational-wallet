<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --gold:#D4A853;--gold-light:#E8C47A;--plum-rose:#7A1060;
  --dusty-mauve:#C8A0C0;--aubergine:#2E0A30;--cream:#FBF8F3;
}
html{height:100%;height:-webkit-fill-available;}
body{
  width:100%;height:100%;min-height:100dvh;overflow:hidden;
  background:#2A0838;color:#fff;font-family:'Raleway',sans-serif;
  display:flex;flex-direction:column;-webkit-tap-highlight-color:transparent;
}
/* Back to hybrid brand gradient — slightly lighter */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  /* Mobile: full plum coverage */
  background:radial-gradient(ellipse 120% 120% at 50% 40%,#8E1870 0%,#7A1060 28%,#6A0D52 58%,#4A0040 82%,#3A0030 100%);
}
/* Desktop: fixed-width plum centre matching board, seamless blend into dark sides */
@media(min-width:700px){
  body{background:#2A0838;}
  body::before{
    background:radial-gradient(ellipse 460px 950px at 50% 42%,#8E1870 0%,#7A1060 25%,#6A0D52 52%,#4A0040 78%,#2A0838 100%);
  }
}
/* Mobile: keep full plum */
@media(max-width:699px){
  body{background:#4A0040;}
}

/* ── Splash ── */
.splash{
  position:fixed;inset:0;z-index:2000;
  background:radial-gradient(ellipse 110% 110% at 50% 50%,#8E1870 0%,#7A1060 30%,#6A0D52 65%,#3A0030 100%);
  cursor:pointer;transition:opacity .9s ease;
}
.splash.out{opacity:0;pointer-events:none;}
/* Tile quilt */
.splash-tiles{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:min(calc(100vw - 24px),460px);
  aspect-ratio:1/1;
  display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);
  gap:8px;opacity:.68;pointer-events:none;z-index:0;
}
.splash-tiles>div{border-radius:16px;border:1px solid rgba(212,168,83,.32);}
.st0{background:linear-gradient(155deg,#3D0D5E,#2A0838);}
.st1{background:linear-gradient(155deg,#E8C97E,#D4A853);}
.st2{background:linear-gradient(155deg,#4A0040,#2A0838);}
.st3{background:linear-gradient(155deg,#FBF8F3,#F5EFE6);}
.st4{background:linear-gradient(155deg,#7A1060,#4A0040);}
.st5{background:linear-gradient(155deg,#FFFFFF,#F5F0F5);}
/* Flower — margin centering so iOS animation doesn't break position */
.splash-flower{
  position:absolute;top:50%;left:50%;
  width:min(148px,37vw);height:min(148px,37vw);
  margin-top:calc(-1 * min(74px,18.5vw));
  margin-left:calc(-1 * min(74px,18.5vw));
  z-index:2;
  animation:splashFlower 1.8s .9s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes splashFlower{
  from{opacity:0;transform:scale(.25) rotate(-90deg);}
  70%{opacity:1;transform:scale(1.08) rotate(6deg);}
  to{opacity:1;transform:scale(1) rotate(0deg);}
}
/* Title — upper area */
.splash-inner{
  position:absolute;top:5%;left:0;right:0;
  z-index:3;display:flex;flex-direction:column;align-items:center;gap:.4rem;
}
/* iPhone: title just above tiles, not floating at top */
@media(max-width:699px){
  .splash-inner{
    top:auto;
    bottom:calc(50% + min(50vw - 6px, 230px) + 22px);
  }
}
.splash-rule{display:none;}
.splash-title{
  font-family:'Cormorant Garamond',serif;font-weight:300;
  font-size:clamp(30px,7vw,44px);color:var(--gold);letter-spacing:.01em;line-height:1.05;
  animation:splashUp 1s .1s cubic-bezier(.22,1,.36,1) both;
}
/* Subtitle — just below tiles */
.splash-sub{
  position:absolute;
  top:calc(50% + min(50vw - 6px,236px) + 10px);
  left:0;right:0;z-index:3;
  font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;
  font-size:clamp(14px,3.8vw,19px);color:rgba(200,160,192,.92);letter-spacing:.04em;
  display:flex;align-items:center;justify-content:center;gap:.6em;
  animation:splashFade 1s 1.6s ease both;
}
/* Tap anywhere — inside bottom-middle gold tile */
.splash-tap{
  position:absolute;
  top:calc(50% + min(33vw,152px));
  left:50%;transform:translateX(-50%);
  z-index:4;
  font-family:'Raleway',sans-serif;font-size:.50rem;letter-spacing:.05em;text-transform:uppercase;
  color:rgba(46,10,48,.90);white-space:nowrap;
  animation:splashTap 2s 2.6s ease-in-out infinite;
}
@keyframes splashUp{from{opacity:0;transform:translateY(28px);}to{opacity:1;transform:none;}}
@keyframes splashFade{from{opacity:0;}to{opacity:1;}}
@keyframes splashTap{0%,100%{opacity:.55;}50%{opacity:1;}}

/* ── Header ── */
.brand-header{
  position:relative;z-index:1;flex-shrink:0;
  background:linear-gradient(145deg,#3D0D5E 0%,#480A52 50%,#4A0040 100%);
  border-bottom:1px solid rgba(212,168,83,.25);padding:.55rem 1rem;text-align:center;
}
.brand-header p{font-family:'Cinzel',serif;font-size:.74rem;font-weight:400;letter-spacing:.20em;color:#E8C84A;margin:0;}

/* ── Title ── */
.title-area{position:relative;z-index:1;flex-shrink:0;text-align:center;padding:1.1vh 1rem .1rem;}
.fb-title{font-family:'Cormorant Garamond',serif;font-size:clamp(30px,5.8vw,44px);font-weight:300;letter-spacing:.01em;color:var(--gold);line-height:1.05;}
.title-ornament{font-size:.36em;color:var(--gold);vertical-align:middle;margin-left:.01em;opacity:1;}
.header-rule{display:none;}
.fb-subtitle{font-family:'Cormorant Garamond',serif;font-size:clamp(15px,3.2vw,18px);font-style:italic;font-weight:300;letter-spacing:.04em;color:rgba(222,182,212,1);opacity:1;display:flex;align-items:center;justify-content:center;gap:.6em;margin-top:.3rem;}
.subtitle-streak{display:inline-block;width:28px;height:1px;flex-shrink:0;}
.subtitle-streak:first-child{background:linear-gradient(to right,transparent,#D4A853);}
.subtitle-streak:last-child{background:linear-gradient(to left,transparent,#D4A853);}

/* ── Board Name ── */
.board-name-wrap{position:relative;z-index:1;flex-shrink:0;text-align:center;padding:.05rem 1.5rem .05rem;margin-top:.7rem;}
.board-name{
  font-family:'Cormorant Garamond',serif;font-size:clamp(19px,4.6vw,25px);font-style:italic;font-weight:300;
  color:rgba(212,168,83,.88);outline:none;display:inline-block;min-width:120px;max-width:90%;
  border-bottom:1px dashed rgba(212,168,83,.38);padding:.04rem .4rem;transition:border-color .2s,color .2s;
}
.board-name:focus{color:var(--gold);border-bottom-color:rgba(212,168,83,.70);}
.board-name:empty::before{content:attr(data-ph);color:rgba(212,168,83,.38);pointer-events:none;}

/* ── Hint ── */
.hint{position:relative;z-index:1;flex-shrink:0;font-size:.82rem;font-weight:400;letter-spacing:.04em;color:rgba(222,182,212,.82);text-align:center;padding:.25rem 1rem .1rem;line-height:1.4;}
.hint-break{display:none;}
@media(max-width:560px){.hint-break{display:block;}}

/* ── Bridge toast ── */
.bridge-toast{position:relative;z-index:2;flex-shrink:0;text-align:center;padding:.18rem 1.2rem;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:13px;color:var(--gold);opacity:0;transition:opacity .5s;pointer-events:none;}
.bridge-toast.on{opacity:1;}

/* ── Board ── */
.board-wrap{position:relative;z-index:1;flex:1;min-height:0;display:flex;align-items:center;justify-content:center;padding:4px 12px;}
@media(max-width:699px){.board-wrap{align-items:flex-start;padding-top:6px;}}
.board{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);gap:8px;width:100%;max-width:460px;aspect-ratio:1/1;}

/* ── Tiles ── */
.tile{
  position:relative;border-radius:16px;border:1px dashed rgba(212,168,83,.27);
  display:flex;align-items:center;justify-content:center;padding:8px 6px;cursor:pointer;
  transition:border-color .25s,box-shadow .25s;overflow:hidden;min-height:0;min-width:0;
}
.tile:active{transform:scale(.97);}

/* Palette — empty whispers */
.tile.t0{background:rgba(61,13,94,.42);}
.tile.t1{background:rgba(74,0,64,.42);}
.tile.t2{background:rgba(122,16,96,.34);}
.tile.t3{background:rgba(245,239,230,.08);}
.tile.t4{background:rgba(232,201,126,.12);}
.tile.t5{background:rgba(245,240,245,.09);}

/* Filled blooms */
.tile.filled.t0{background:linear-gradient(155deg,#3D0D5E,#2A0838);border:1px solid rgba(212,168,83,.50);box-shadow:0 2px 12px rgba(0,0,0,.28);}
.tile.filled.t1{background:linear-gradient(155deg,#4A0040,#2A0838);border:1px solid rgba(212,168,83,.50);box-shadow:0 2px 12px rgba(0,0,0,.28);}
.tile.filled.t2{background:linear-gradient(155deg,#7A1060,#4A0040);border:1px solid rgba(212,168,83,.50);box-shadow:0 2px 12px rgba(0,0,0,.28);}
.tile.filled.t3{background:linear-gradient(155deg,#FBF8F3,#F5EFE6);border:1px solid rgba(212,168,83,.72);box-shadow:0 2px 12px rgba(0,0,0,.15);}
.tile.filled.t4{background:linear-gradient(155deg,#E8C97E,#D4A853);border:1px solid rgba(255,255,255,.55);box-shadow:0 2px 12px rgba(0,0,0,.15);}
.tile.filled.t5{background:linear-gradient(155deg,#FFFFFF,#F5F0F5);border:1px solid rgba(212,168,83,.60);box-shadow:0 2px 12px rgba(0,0,0,.15);}
.tile.filled.t5 .desire{color:var(--aubergine);}
.tile.filled.t5.today-focus::before{color:var(--aubergine);opacity:.60;}

/* Light tile text */
.tile.filled.t3 .desire,.tile.filled.t4 .desire{color:var(--aubergine);}

/* ✦ on empty tiles — same gold everywhere */
.tile-star{font-size:clamp(14px,3.5vw,20px);color:rgba(212,168,83,.82);pointer-events:none;text-shadow:0 0 10px rgba(212,168,83,.40);}

/* Desire text — size set dynamically */
.tile .desire{
  font-family:'Cormorant Garamond',serif;font-weight:400;line-height:1.3;
  text-align:center;color:#fff;word-break:break-word;overflow:hidden;
  max-height:84%;pointer-events:none;display:block;
}
@media(max-width:699px){
  .tile .desire{font-weight:600;}
}

/* Single-tap: gold border focus */
.tile.basking{border:2px solid var(--gold) !important;box-shadow:0 0 0 2px rgba(212,168,83,.22),0 0 18px rgba(212,168,83,.42),inset 0 0 14px rgba(212,168,83,.08) !important;}
.tile.filled.t3.basking,.tile.filled.t4.basking{box-shadow:0 0 0 2px rgba(212,168,83,.28),0 0 16px rgba(212,168,83,.32),inset 0 0 10px rgba(212,168,83,.07) !important;}

/* Double-tap: today's focus crown */
.tile.today-focus{border:2px solid var(--gold) !important;box-shadow:0 0 0 3px rgba(212,168,83,.30),0 0 28px rgba(212,168,83,.60),inset 0 0 20px rgba(212,168,83,.12) !important;}
.tile.today-focus::before{content:'✦';position:absolute;top:5px;left:7px;font-size:15px;color:var(--gold);opacity:.95;pointer-events:none;z-index:2;text-shadow:0 0 8px rgba(212,168,83,.70);}
.tile.filled.t3.today-focus::before,.tile.filled.t4.today-focus::before{color:var(--aubergine);opacity:.60;}

/* ── Count ── */
.count{position:relative;z-index:1;flex-shrink:0;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:15px;color:rgba(212,168,83,.78);text-align:center;padding:.06rem 1rem;min-height:20px;line-height:1.3;}

/* ── Controls ── */
.bottom-controls{position:relative;z-index:1;flex-shrink:0;display:flex;gap:9px;align-items:center;justify-content:center;padding:.18rem 1rem calc(.38rem + env(safe-area-inset-bottom,0px));}
.btn{font-family:'Raleway',sans-serif;font-size:.60rem;letter-spacing:.12em;text-transform:uppercase;font-weight:500;padding:9px 20px;border-radius:50px;border:none;cursor:pointer;transition:all .2s;line-height:1.2;}
.btn-gold{background:linear-gradient(135deg,#A87830 0%,#D4A853 50%,#E8C47A 100%);color:#2E0A30;box-shadow:0 4px 16px rgba(212,168,83,.28);}
.btn-gold:hover{transform:translateY(-1px);box-shadow:0 6px 22px rgba(212,168,83,.44);}
.btn-ghost{background:transparent;color:rgba(200,160,192,.65);border:1px solid rgba(212,168,83,.24);font-weight:300;}
.btn-ghost:hover{border-color:var(--gold);color:rgba(200,160,192,.95);}
.btn-purple-solid{
  background:linear-gradient(135deg,#5A0E66 0%,#3D0D5E 100%);
  color:var(--gold);border:1.5px solid rgba(212,168,83,.60);font-weight:500;
}
.btn-purple-solid:hover{border-color:var(--gold);box-shadow:0 4px 14px rgba(212,168,83,.28);transform:translateY(-1px);}

/* ── Reset confirm ── */
.reset-confirm{display:flex;align-items:center;gap:8px;animation:fadeUp .2s ease;}
.reset-confirm span{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:13px;color:var(--dusty-mauve);white-space:nowrap;}
.btn-yes{background:rgba(180,60,60,.22);color:#f5b8b8;border:1px solid rgba(220,80,80,.40);font-family:'Raleway',sans-serif;font-size:.58rem;font-weight:400;letter-spacing:.10em;text-transform:uppercase;padding:8px 16px;border-radius:50px;cursor:pointer;transition:background .2s;}
.btn-yes:hover{background:rgba(200,60,60,.38);}
.btn-no{background:transparent;color:rgba(200,160,192,.60);border:1px solid rgba(212,168,83,.22);font-family:'Raleway',sans-serif;font-size:.58rem;font-weight:300;letter-spacing:.10em;text-transform:uppercase;padding:8px 14px;border-radius:50px;cursor:pointer;transition:all .2s;}
.btn-no:hover{border-color:var(--gold);color:rgba(200,160,192,.95);}

/* ── Edit Sheet — centred modal ── */
.edit-backdrop{position:fixed;inset:0;background:rgba(42,8,56,.70);z-index:500;display:none;backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);}
.edit-backdrop.on{display:block;}
.edit-sheet{
  position:fixed;top:50%;left:50%;z-index:600;
  width:min(460px,88vw);
  background:linear-gradient(160deg,#3D0D5E 0%,#2A0838 100%);
  border:1px solid rgba(212,168,83,.38);border-radius:20px;
  padding:1.2rem 1.4rem 1.5rem;
  transform:translate(-50%,-46%);opacity:0;pointer-events:none;
  transition:transform .28s cubic-bezier(.32,.72,0,1),opacity .28s ease;
}
.edit-sheet.on{transform:translate(-50%,-50%);opacity:1;pointer-events:all;}
.sheet-handle{display:none;}
.sheet-top{display:flex;align-items:center;justify-content:center;position:relative;margin-bottom:.7rem;}
.sheet-label{font-size:.55rem;letter-spacing:.13em;text-transform:uppercase;color:var(--gold);font-family:'Raleway',sans-serif;white-space:nowrap;}
.sheet-back{
  position:absolute;left:0;top:50%;transform:translateY(-50%);
  background:rgba(255,255,255,.08);border:1px solid rgba(212,168,83,.28);
  border-radius:50%;width:30px;height:30px;
  display:flex;align-items:center;justify-content:center;
  color:rgba(200,160,192,.80);font-size:14px;cursor:pointer;
  transition:background .2s,color .2s;
}
.sheet-back:hover{background:rgba(212,168,83,.18);color:var(--gold);}
.sheet-preview-wrap{display:flex;justify-content:center;margin-bottom:.85rem;}
.sheet-preview-tile{
  width:180px;height:180px;border-radius:16px;
  display:flex;align-items:center;justify-content:center;
  padding:16px;position:relative;
  border:2px solid var(--gold);
  box-shadow:0 0 0 2px rgba(212,168,83,.22),0 0 18px rgba(212,168,83,.42),inset 0 0 14px rgba(212,168,83,.08);
}
@media(max-width:480px){.sheet-preview-tile{width:148px;height:148px;padding:13px;}}
.sheet-preview-tile.t0{background:linear-gradient(155deg,#3D0D5E,#2A0838);}
.sheet-preview-tile.t1{background:linear-gradient(155deg,#4A0040,#2A0838);}
.sheet-preview-tile.t2{background:linear-gradient(155deg,#7A1060,#4A0040);}
.sheet-preview-tile.t3{background:linear-gradient(155deg,#FBF8F3,#F5EFE6);}
.sheet-preview-tile.t4{background:linear-gradient(155deg,#E8C97E,#D4A853);}
.sheet-preview-tile.t5{background:linear-gradient(155deg,#FFFFFF,#F5F0F5);}
.sheet-ta{
  width:100%;max-height:100%;background:transparent;border:none;outline:none;
  font-family:'Cormorant Garamond',serif;font-weight:400;line-height:1.28;
  text-align:center;color:#fff;word-break:break-word;overflow:hidden;
  cursor:text;
}
.sheet-preview-tile.t3 .sheet-ta,.sheet-preview-tile.t4 .sheet-ta,.sheet-preview-tile.t5 .sheet-ta{color:var(--aubergine);}
@media(max-width:699px){.sheet-ta{font-weight:600;}}
.sheet-actions{display:flex;gap:9px;margin-top:.65rem;justify-content:flex-end;align-items:center;}
.sheet-char{font-size:.55rem;color:rgba(200,160,192,.45);margin-right:auto;font-family:'Raleway',sans-serif;letter-spacing:.05em;}
/* Bright clear button */
.btn-clear{
  font-family:'Raleway',sans-serif;font-size:.60rem;letter-spacing:.12em;text-transform:uppercase;
  font-weight:500;padding:9px 18px;border-radius:50px;cursor:pointer;transition:all .2s;
  background:rgba(255,255,255,.22);color:#fff;border:1px solid rgba(255,255,255,.55);
}
.btn-clear:hover{background:rgba(255,255,255,.35);}

/* ── Image Overlay ── */
.img-overlay{position:fixed;inset:0;z-index:999;background:linear-gradient(145deg,#3D0D5E 0%,#480A52 40%,#2A0838 100%);display:none;flex-direction:column;align-items:center;justify-content:center;padding:env(safe-area-inset-top,20px) 20px env(safe-area-inset-bottom,20px);gap:14px;}
.img-overlay.on{display:flex;animation:fadeUp .32s ease;}
.img-overlay img{max-width:min(360px,80vw);max-height:42vh;border-radius:14px;box-shadow:0 0 40px rgba(212,168,83,.28);object-fit:contain;display:block;}
.overlay-tip{color:rgba(212,168,83,.75);font-family:'Raleway',sans-serif;font-size:12px;text-align:center;letter-spacing:.05em;line-height:1.65;}
.overlay-actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
.overlay-btn{font-family:'Raleway',sans-serif;font-size:.60rem;font-weight:400;letter-spacing:.12em;text-transform:uppercase;padding:10px 22px;border-radius:50px;border:1px solid rgba(212,168,83,.58);background:rgba(212,168,83,.10);color:rgba(212,168,83,.95);cursor:pointer;text-decoration:none;display:inline-block;transition:background .2s;}
.overlay-btn:hover{background:rgba(212,168,83,.20);}
.overlay-share{font-family:'Raleway',sans-serif;font-size:.60rem;font-weight:400;letter-spacing:.12em;text-transform:uppercase;padding:10px 22px;border-radius:50px;border:1px solid rgba(212,168,83,.36);background:transparent;color:rgba(212,168,83,.75);cursor:pointer;transition:background .2s;}
.overlay-share:hover{background:rgba(212,168,83,.10);}
.overlay-close{font-family:'Raleway',sans-serif;font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;padding:8px 20px;border-radius:50px;border:1px solid rgba(212,168,83,.20);background:transparent;color:rgba(212,168,83,.48);cursor:pointer;transition:all .2s;}
.overlay-close:hover{border-color:rgba(212,168,83,.48);color:rgba(212,168,83,.75);}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important;}}
</style>
</head>
<body>

<!-- ── Splash ── -->
<div class="splash" id="splash">
  <!-- Tile quilt background -->
  <div class="splash-tiles">
    <div class="st0"></div><div class="st1"></div><div class="st2"></div>
    <div class="st3"></div><div class="st4"></div><div class="st5"></div>
    <div class="st0"></div><div class="st1"></div><div class="st2"></div>
  </div>
  <!-- Geo + text -->
  <!-- Flower pinned to screen centre -->
  <svg class="splash-flower" viewBox="0 0 100 100" fill="none">
    <circle cx="50" cy="32" r="18" stroke="#D4A853" stroke-width="0.72"/>
    <circle cx="50" cy="68" r="18" stroke="#D4A853" stroke-width="0.72"/>
    <circle cx="35.4" cy="41" r="18" stroke="#D4A853" stroke-width="0.72"/>
    <circle cx="64.6" cy="41" r="18" stroke="#D4A853" stroke-width="0.72"/>
    <circle cx="35.4" cy="59" r="18" stroke="#D4A853" stroke-width="0.72"/>
    <circle cx="64.6" cy="59" r="18" stroke="#D4A853" stroke-width="0.72"/>
    <circle cx="50" cy="50" r="18" stroke="#E8C47A" stroke-width="0.72"/>
  </svg>
  <!-- Title in upper area -->
  <div class="splash-inner">
    <div class="splash-title">The Focus Board <span class="title-ornament">✦</span></div>
  </div>
  <!-- Subtitle below tiles -->
  <div class="splash-sub">
    <span class="subtitle-streak"></span>
    point toward what you want
    <span class="subtitle-streak"></span>
  </div>
  <!-- Tap anywhere — inside bottom-middle gold tile -->
  <div class="splash-tap">Tap anywhere to enter</div>
</div>

<header class="brand-header">
  <p>✦ &nbsp; THE ART OF DIVINE ALIGNMENT &nbsp; ✦</p>
</header>

<div class="title-area">
  <h1 class="fb-title">The Focus Board <span class="title-ornament">✦</span></h1>
  <div class="header-rule"></div>
  <p class="fb-subtitle">
    <span class="subtitle-streak"></span>
    point toward what you want
    <span class="subtitle-streak"></span>
  </p>
</div>

<div class="board-name-wrap">
  <div class="board-name" id="boardName" contenteditable="true" data-ph="Name this board…" spellcheck="false"></div>
</div>

<p class="hint">Tap to focus &nbsp;·&nbsp; double-tap to crown today's desire<br class="hint-break"> &nbsp;·&nbsp; hold to edit</p>
<div class="bridge-toast" id="bridgeToast"></div>

<div class="board-wrap">
  <main class="board" id="board" aria-label="Your Focus Board"></main>
</div>

<p class="count" id="count"></p>

<div class="bottom-controls">
  <button class="btn btn-gold" id="saveBtn">Save &amp; Share &nbsp;✦</button>
  <div id="resetArea">
    <button class="btn btn-purple-solid" id="resetBtn">Begin again &nbsp;✦</button>
  </div>
</div>

<!-- Edit Sheet -->
<div class="edit-backdrop" id="editBackdrop"></div>
<div class="edit-sheet" id="editSheet">
  <div class="sheet-handle"></div>
  <div class="sheet-top">
    <button class="sheet-back" id="sheetBack">←</button>
    <div class="sheet-label" id="sheetLabel">✦ &nbsp; Focus your desire &nbsp; ✦</div>
  </div>
  <div class="sheet-preview-wrap">
    <div class="sheet-preview-tile" id="sheetPreviewTile">
      <div class="sheet-ta" id="sheetTa" contenteditable="true" spellcheck="false" autocorrect="off" autocapitalize="off" autocomplete="off"></div>
    </div>
  </div>
  <div class="sheet-actions">
    <span class="sheet-char" id="sheetChar">0 / 90</span>
    <button class="btn-clear" id="sheetClear">Clear</button>
    <button class="btn btn-gold" id="sheetDone" style="padding:8px 18px;">Focus it ✦</button>
  </div>
</div>

<!-- Image Overlay -->
<div class="img-overlay" id="imgOverlay">
  <img id="overlayImg" src="" alt="Your Focus Board">
  <p class="overlay-tip" id="overlayTip"></p>
  <div class="overlay-actions">
    <button class="overlay-share" id="overlayShare" style="display:none;">↑ &nbsp;Share</button>
    <a class="overlay-btn" id="overlayDl" download="focus-board.png">↓ &nbsp;Download</a>
  </div>
  <button class="overlay-close" id="overlayClose">✕ &nbsp;Close</button>
</div>

<script>
(function(){
  const TILES=9, KEY='tada-focus-board', KEY_NAME='tada-focus-board-name', KEY_TODAY='tada-focus-board-today', BRIDGE_KEY='tada-fw-bridge';
  const QUILT=[0,4,1,3,2,5,0,4,1];

  let desires=loadDesires(), todayIdx=loadToday(), editIdx=-1;
  let pressTimer=null;

  const boardEl=document.getElementById('board');
  const countEl=document.getElementById('count');
  const editSheet=document.getElementById('editSheet');
  const editBackdrop=document.getElementById('editBackdrop');
  const sheetTa=document.getElementById('sheetTa');
  const sheetChar=document.getElementById('sheetChar');
  const sheetLabel=document.getElementById('sheetLabel');
  const boardNameEl=document.getElementById('boardName');
  const bridgeToast=document.getElementById('bridgeToast');

  function loadDesires(){
    try{const s=JSON.parse(localStorage.getItem(KEY));if(Array.isArray(s)){if(s.length===TILES)return s;if(s.length>TILES)return s.slice(0,TILES);}}catch(e){}
    return Array(TILES).fill('');
  }
  function loadToday(){
    try{const v=localStorage.getItem(KEY_TODAY);return v!==null?parseInt(v,10):-1;}catch(e){return -1;}
  }
  function saveDesires(){try{localStorage.setItem(KEY,JSON.stringify(desires));}catch(e){}}
  function saveToday(){try{localStorage.setItem(KEY_TODAY,String(todayIdx));}catch(e){}}

  // Board name
  const savedName=localStorage.getItem(KEY_NAME)||'';
  if(savedName)boardNameEl.textContent=savedName;
  boardNameEl.addEventListener('input',()=>{try{localStorage.setItem(KEY_NAME,boardNameEl.textContent.trim());}catch(e){}});
  boardNameEl.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();boardNameEl.blur();}});

  function updateCount(){
    const n=desires.filter(Boolean).length;
    countEl.textContent=n===9?'All nine desires in focus — your board is full of light  ✦':n===0?'0 of 9 desires in focus  ✦':n+' of 9 desires in focus  ✦';
  }

  // Auto-shrink: single words use width-fit (no wrap), phrases use height-fit
  function autoFitTiles(){
    requestAnimationFrame(()=>{
      document.querySelectorAll('.tile.filled .desire').forEach(span=>{
        const tile=span.closest('.tile');
        if(!tile)return;
        const singleWord=!span.textContent.trim().includes(' ');
        let size=parseFloat(span.style.fontSize)||16;
        let i=0;
        if(singleWord){
          span.style.whiteSpace='nowrap';
          while(span.scrollWidth>tile.clientWidth*.88&&size>9&&i<40){size-=0.7;span.style.fontSize=size+'px';i++;}
          span.style.whiteSpace='';
        } else {
          const maxH=tile.clientHeight*.82;
          while(span.scrollHeight>maxH&&size>9&&i<40){size-=0.7;span.style.fontSize=size+'px';i++;}
        }
      });
    });
  }

  // Dynamic starting size by text length
  function desireSize(text){
    const n=text.length;
    const mobile=window.innerWidth<=699;
    if(mobile){
      if(n<=5)  return 'clamp(24px,7vw,32px)';
      if(n<=10) return 'clamp(21px,6vw,28px)';
      if(n<=18) return 'clamp(19px,5.2vw,24px)';
      if(n<=30) return 'clamp(16px,4.4vw,20px)';
      if(n<=45) return 'clamp(14px,3.7vw,17px)';
      return 'clamp(12px,3.2vw,15px)';
    }
    if(n<=5)  return 'clamp(20px,5vw,26px)';
    if(n<=10) return 'clamp(18px,4.5vw,23px)';
    if(n<=18) return 'clamp(16px,4vw,20px)';
    if(n<=30) return 'clamp(14px,3.5vw,17px)';
    if(n<=45) return 'clamp(12px,3vw,15px)';
    return 'clamp(11px,2.6vw,13px)';
  }

  function render(){
    boardEl.innerHTML='';
    desires.forEach((text,i)=>{
      const qt=QUILT[i%6];
      const tile=document.createElement('div');
      let cls='tile t'+qt+(text?' filled':'');
      if(text&&i===todayIdx)cls+=' today-focus';
      tile.className=cls;
      tile.setAttribute('role','button');tile.setAttribute('tabindex','0');

      if(text){
        const span=document.createElement('span');
        span.className='desire';span.textContent=text;span.style.fontSize=desireSize(text);
        tile.appendChild(span);
        let lastTap=0;
        tile.addEventListener('click',()=>{
          const now=Date.now();
          if(now-lastTap<320){todayIdx=(todayIdx===i)?-1:i;saveToday();render();}
          else{tile.classList.toggle('basking');}
          lastTap=now;
        });
        tile.addEventListener('pointerdown',()=>{pressTimer=setTimeout(()=>openSheet(i),520);});
        tile.addEventListener('pointerup',()=>clearTimeout(pressTimer));
        tile.addEventListener('pointerleave',()=>clearTimeout(pressTimer));
        tile.addEventListener('contextmenu',e=>{e.preventDefault();openSheet(i);});
      } else {
        const star=document.createElement('span');
        star.className='tile-star';star.textContent='✦';
        tile.appendChild(star);
        tile.addEventListener('click',()=>openSheet(i));
      }
      tile.addEventListener('keydown',e=>{if((e.key==='Enter'||e.key===' ')&&!editSheet.classList.contains('on')){e.preventDefault();tile.click();}});
      boardEl.appendChild(tile);
    });
    updateCount();
    autoFitTiles();
  }

  function previewBaseSize(text){
    const n=text.length;
    if(n<=5)  return 34;
    if(n<=10) return 29;
    if(n<=18) return 25;
    if(n<=30) return 20;
    if(n<=45) return 17;
    return 15;
  }
  function fitSheetPreview(){
    const text=sheetTa.textContent||'';
    const singleWord=text.trim().length>0&&!text.trim().includes(' ');
    let size=previewBaseSize(text);
    sheetTa.style.whiteSpace=singleWord?'nowrap':'';
    sheetTa.style.fontSize=size+'px';
    requestAnimationFrame(()=>{
      const tileEl=document.getElementById('sheetPreviewTile');
      const maxH=tileEl.clientHeight*0.86;
      const maxW=tileEl.clientWidth*0.88;
      let i=0;
      while(i<40&&size>10){
        const fits=singleWord?sheetTa.scrollWidth<=maxW:sheetTa.scrollHeight<=maxH;
        if(fits)break;
        size-=1;sheetTa.style.fontSize=size+'px';i++;
      }
    });
  }

  // ── Edit Sheet ──
  function openSheet(i){
    editIdx=i;
    const qt=QUILT[i%6];
    sheetLabel.textContent='✦  '+(desires[i]?'Refocus your desire':'Focus your desire')+'  ✦';
    document.getElementById('sheetPreviewTile').className='sheet-preview-tile t'+qt;
    sheetTa.textContent=desires[i]||'';
    sheetChar.textContent=(desires[i]||'').length+' / 90';
    editSheet.classList.add('on');editBackdrop.classList.add('on');
    fitSheetPreview();
    setTimeout(()=>sheetTa.focus(),80);
  }
  function closeSheet(){editSheet.classList.remove('on');editBackdrop.classList.remove('on');editIdx=-1;sheetTa.blur();}
  function commitSheet(){
    if(editIdx<0){closeSheet();return;}
    desires[editIdx]=sheetTa.textContent.trim();
    if(todayIdx===editIdx&&!desires[editIdx]){todayIdx=-1;saveToday();}
    saveDesires();closeSheet();render();
  }

  function placeCaretAtEnd(el){
    el.focus();
    const range=document.createRange();
    range.selectNodeContents(el);
    range.collapse(false);
    const sel=window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
  }

  sheetTa.addEventListener('input',()=>{
    if(sheetTa.textContent.length>90){
      sheetTa.textContent=sheetTa.textContent.slice(0,90);
      placeCaretAtEnd(sheetTa);
    }
    sheetChar.textContent=sheetTa.textContent.length+' / 90';
    fitSheetPreview();
  });
  sheetTa.addEventListener('keydown',e=>{
    if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();commitSheet();}
    if(e.key==='Escape')closeSheet();
    if(e.key==='Tab'){
      e.preventDefault();
      if(editIdx<0)return;
      desires[editIdx]=sheetTa.textContent.trim();
      if(todayIdx===editIdx&&!desires[editIdx]){todayIdx=-1;saveToday();}
      saveDesires();
      const cur=editIdx;
      // Find next empty tile after current, wrap around
      let next=-1;
      for(let k=1;k<TILES;k++){const idx=(cur+k)%TILES;if(!desires[idx]){next=idx;break;}}
      closeSheet();render();
      if(next!==-1)setTimeout(()=>openSheet(next),60);
    }
  });
  document.getElementById('sheetDone').addEventListener('click',commitSheet);
  document.getElementById('sheetClear').addEventListener('click',()=>{sheetTa.textContent='';sheetChar.textContent='0 / 90';sheetTa.focus();fitSheetPreview();});
  document.getElementById('sheetBack').addEventListener('click',closeSheet);
  editBackdrop.addEventListener('click',closeSheet);

  // ── Bridge ──
  function checkBridge(){
    try{
      const incoming=localStorage.getItem(BRIDGE_KEY);
      if(!incoming)return;
      localStorage.removeItem(BRIDGE_KEY);
      const firstEmpty=desires.indexOf('');
      if(firstEmpty===-1)return;
      desires[firstEmpty]=incoming.trim();saveDesires();render();
      bridgeToast.textContent='✦  Desire received from your Focus Wheel  ✦';
      bridgeToast.classList.add('on');
      setTimeout(()=>bridgeToast.classList.remove('on'),3200);
    }catch(e){}
  }

  // ── Reset ──
  let resetTimeout=null;
  function showResetConfirm(){
    const area=document.getElementById('resetArea');
    area.innerHTML='<div class="reset-confirm"><span>Are you sure?</span><button class="btn-yes" id="resetYes">Yes, clear</button><button class="btn-no" id="resetNo">Keep it</button></div>';
    document.getElementById('resetYes').addEventListener('click',()=>{clearTimeout(resetTimeout);desires=Array(TILES).fill('');todayIdx=-1;saveDesires();saveToday();boardNameEl.textContent='';try{localStorage.removeItem(KEY_NAME);}catch(e){}restoreResetBtn();render();});
    document.getElementById('resetNo').addEventListener('click',()=>{clearTimeout(resetTimeout);restoreResetBtn();});
    resetTimeout=setTimeout(restoreResetBtn,4000);
  }
  function restoreResetBtn(){
    document.getElementById('resetArea').innerHTML='<button class="btn btn-purple-solid" id="resetBtn">Begin again &nbsp;✦</button>';
    document.getElementById('resetBtn').addEventListener('click',()=>{if(desires.some(Boolean))showResetConfirm();});
  }
  document.getElementById('resetBtn').addEventListener('click',()=>{if(desires.some(Boolean))showResetConfirm();});

  // ── Canvas helpers ──
  function measureLines(ctx,text,maxW){
    const words=text.split(' ');const lines=[];let line='';
    for(const w of words){const t=line?line+' '+w:w;if(ctx.measureText(t).width>maxW&&line){lines.push(line);line=w;}else line=t;}
    if(line)lines.push(line);return lines;
  }
  function drawFittedText(ctx,text,cx,cy,maxW,maxH,textColor){
    let fs=Math.min(maxH*.30,maxW*.22,52);
    for(let pass=0;pass<35;pass++){
      ctx.font=`italic 400 ${fs}px "Cormorant Garamond",Georgia,serif`;
      const lh=fs*1.35;const lines=measureLines(ctx,text,maxW);
      if(lines.length*lh<=maxH||fs<=10){
        const startY=cy-((lines.length-1)*lh)/2;
        ctx.fillStyle=textColor;ctx.textAlign='center';ctx.textBaseline='middle';
        lines.forEach((l,j)=>ctx.fillText(l,cx,startY+j*lh));return;
      }
      fs-=1.2;
    }
  }
  function roundRect(ctx,x,y,w,h,r){
    ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
    ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
  }

  const TILE_CANVAS=[
    ['#3D0D5E','#2A0838','#FFFFFF','rgba(212,168,83,.55)'],
    ['#E8C97E','#D4A853','#2E0A30','rgba(255,255,255,.55)'],
    ['#4A0040','#2A0838','#FFFFFF','rgba(212,168,83,.55)'],
    ['#FBF8F3','#F5EFE6','#2E0A30','rgba(212,168,83,.75)'],
    ['#7A1060','#4A0040','#FFFFFF','rgba(212,168,83,.55)'],
    ['#FFFFFF','#F5F0F5','#2E0A30','rgba(212,168,83,.65)'],
  ];

  // ── Save & Share ──
  document.getElementById('saveBtn').addEventListener('click',()=>{
    const COLS=3,ROWS=3;
    const W=900,H=1050;
    const c=document.createElement('canvas');c.width=W;c.height=H;
    const ctx=c.getContext('2d');

    // Background — original brand deep purple gradient
    const bg=ctx.createRadialGradient(W/2,H*.38,0,W/2,H/2,W*.85);
    bg.addColorStop(0,'#5A1070');bg.addColorStop(.25,'#480A52');
    bg.addColorStop(.55,'#3D0D5E');bg.addColorStop(.8,'#2E0A30');bg.addColorStop(1,'#2A0838');
    ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

    const hbar=ctx.createLinearGradient(0,0,W,0);
    hbar.addColorStop(0,'#3D0D5E');hbar.addColorStop(.5,'#480A52');hbar.addColorStop(1,'#4A0040');
    ctx.fillStyle=hbar;ctx.fillRect(0,0,W,76);
    ctx.strokeStyle='rgba(212,168,83,.28)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(0,76);ctx.lineTo(W,76);ctx.stroke();

    ctx.textAlign='center';ctx.fillStyle='#E8C84A';ctx.font='400 21px "Cinzel",serif';
    ctx.fillText('✦   THE ART OF DIVINE ALIGNMENT   ✦',W/2,49);

    ctx.fillStyle='#D4A853';ctx.font='300 62px "Cormorant Garamond",Georgia,serif';
    ctx.fillText('Focus Board',W/2,148);

    const rl=ctx.createLinearGradient(W/2-110,0,W/2+110,0);
    rl.addColorStop(0,'rgba(212,168,83,0)');rl.addColorStop(.5,'rgba(212,168,83,.78)');rl.addColorStop(1,'rgba(212,168,83,0)');
    ctx.strokeStyle=rl;ctx.lineWidth=1.8;ctx.beginPath();ctx.moveTo(W/2-110,160);ctx.lineTo(W/2+110,160);ctx.stroke();

    let topY=188;
    const bName=(document.getElementById('boardName').textContent||'').trim();
    ctx.fillStyle='rgba(200,160,192,.75)';ctx.font='italic 300 23px "Cormorant Garamond",Georgia,serif';
    ctx.fillText(bName||'✦  point toward what you want  ✦',W/2,topY);topY=218;

    const padX=28,footH=68,gX=11,gY=11;
    const availW=W-padX*2,availH=H-topY-footH;
    const tW=(availW-gX*(COLS-1))/COLS,tH=(availH-gY*(ROWS-1))/ROWS;
    const rad=8;

    for(let i=0;i<TILES;i++){
      const col=i%COLS,row=Math.floor(i/COLS);
      const x=padX+col*(tW+gX),y=topY+row*(tH+gY);
      const [c1,c2,textCol,borderCol]=TILE_CANVAS[i%6];
      roundRect(ctx,x,y,tW,tH,rad);
      const tg=ctx.createLinearGradient(x,y,x+tW,y+tH);tg.addColorStop(0,c1);tg.addColorStop(1,c2);
      ctx.fillStyle=tg;ctx.fill();
      if(i===todayIdx){
        ctx.strokeStyle='rgba(212,168,83,.95)';ctx.lineWidth=2.5;ctx.stroke();
        ctx.fillStyle='rgba(212,168,83,.90)';ctx.font='bold 16px serif';
        ctx.textAlign='left';ctx.textBaseline='top';ctx.fillText('✦',x+8,y+7);
        ctx.textAlign='center';ctx.textBaseline='middle';
      } else {ctx.strokeStyle=borderCol;ctx.lineWidth=1.5;ctx.stroke();}
      if(desires[i]){
        drawFittedText(ctx,desires[i],x+tW/2,y+tH/2,tW-22,tH*.82,textCol);
      } else {
        ctx.save();
        ctx.fillStyle=textCol==='#2E0A30'?'rgba(46,10,48,.28)':'rgba(212,168,83,.30)';
        ctx.textAlign='center';ctx.textBaseline='middle';ctx.font='300 26px Raleway,sans-serif';
        ctx.fillText('+',x+tW/2,y+tH/2);ctx.restore();
      }
    }
    ctx.textAlign='center';ctx.fillStyle='rgba(212,168,83,.58)';ctx.font='italic 300 19px "Cormorant Garamond",Georgia,serif';
    ctx.fillText('© The Art of Divine Alignment · theartofdivinealignment.com',W/2,H-32);

    const dataUrl=c.toDataURL('image/png');
    document.getElementById('overlayImg').src=dataUrl;
    document.getElementById('overlayTip').textContent=/iPad|iPhone|iPod/.test(navigator.userAgent)?'Long-press the image → Save to Photos':'Click Download or right-click → Save Image As';
    c.toBlob(blob=>{
      const blobUrl=URL.createObjectURL(blob);
      const dl=document.getElementById('overlayDl');dl.href=blobUrl;dl.onclick=()=>setTimeout(()=>URL.revokeObjectURL(blobUrl),2000);
      const shareBtn=document.getElementById('overlayShare');
      if(navigator.share&&navigator.canShare){
        const file=new File([blob],'focus-board.png',{type:'image/png'});
        if(navigator.canShare({files:[file]})){shareBtn.style.display='inline-block';shareBtn.onclick=async()=>{try{await navigator.share({files:[file],title:'My Focus Board',text:'Pointing toward what I want — The Art of Divine Alignment'});}catch(e){}}}
      }
      document.getElementById('imgOverlay').classList.add('on');
    },'image/png');
  });

  document.getElementById('overlayClose').addEventListener('click',()=>{document.getElementById('imgOverlay').classList.remove('on');});

  // ── Splash ──
  const splash=document.getElementById('splash');
  function dismissSplash(){
    splash.classList.add('out');
    setTimeout(()=>{splash.style.display='none';},900);
  }
  splash.addEventListener('click',dismissSplash);
  setTimeout(dismissSplash,6500);

  // ── Init ──
  function sizeBoard(){
    const wrap=document.querySelector('.board-wrap');
    if(!wrap||!boardEl)return;
    const w=wrap.clientWidth-24;
    const h=wrap.clientHeight-8;
    const size=Math.max(140,Math.min(460,w,h));
    boardEl.style.width=size+'px';
    boardEl.style.height=size+'px';
  }
  render();
  checkBridge();
  sizeBoard();
  window.addEventListener('resize',sizeBoard);
  window.addEventListener('orientationchange',()=>setTimeout(sizeBoard,80));
})();
</script>
</body>
</html>
