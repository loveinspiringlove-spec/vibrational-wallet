<style>
  :root {
    --gold:          #D4A853;
    --gold-light:    #ECC87E;
    --gold-glow:     rgba(212,168,83,0.45);
    --gold-dim:      #A8793A;
    --grad-1: #3D0D5E;
    --grad-2: #480A52;
    --grad-3: #4A0040;
    --grad-4: #2A0838;
    --plum-rose:     #7A1060;
    --dusty-mauve:   #DDB8D8;
    --aubergine:     #2E0A30;
    --on-dark-body:  #F0E8FF;
    --on-dark-title: var(--gold-light);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--grad-4);
    min-height: 100%;
    font-family: 'Cormorant Garamond', serif;
    color: var(--on-dark-body);
    overflow-x: hidden;
  }

  body {
    background: linear-gradient(145deg,
      #3D0D5E 0%,
      #480A52 28%,
      #4A0040 62%,
      #2A0838 100%);
    min-height: 100vh;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 80% 45% at 50% 0%, rgba(90,20,110,0.35) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 30%, rgba(74,0,64,0.3) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 95%, rgba(42,8,56,0.5) 0%, transparent 55%);
    pointer-events: none; z-index: 0;
  }

  .container {
    max-width: 600px; margin: 0 auto;
    padding: 0 18px 60px; position: relative; z-index: 1;
  }

  /* ── HEADER ── */
  .header { text-align: center; margin-bottom: 6px; animation: fadeDown 0.9s ease both; padding-top: 14px; }
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .brand-nav {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    margin-bottom: 0;
    padding: 10px 0;
    border-top: 1px solid rgba(212,168,83,0.28);
    border-bottom: 1px solid rgba(212,168,83,0.28);
  }
  .brand-nav-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(11px, 2.4vw, 13px);
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--dusty-mauve);
  }
  .brand-nav-star {
    color: var(--gold-light); font-size: 12px;
    text-shadow: 0 0 8px var(--gold-glow);
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(34px, 8.5vw, 54px);
    font-weight: 400;
    color: var(--gold-light);
    text-shadow: 0 0 50px var(--gold-glow), 0 2px 4px rgba(0,0,0,0.3);
    letter-spacing: 1px;
    margin-bottom: 0;
    white-space: nowrap;
  }

  .header-divider {
    width: 52%; height: 1px;
    margin: 8px auto 12px;
    background: linear-gradient(to right, transparent, rgba(212,168,83,0.7) 30%, rgba(212,168,83,0.7) 70%, transparent);
  }

  .subtitle {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(16px, 4vw, 20px);
    font-style: italic;
    font-weight: 300;
    color: var(--on-dark-body);
    line-height: 1.6;
    margin-bottom: 4px;
  }

  .header-tagline {
    font-size: 15px; font-style: italic;
    color: var(--dusty-mauve); font-weight: 300;
    margin-top: 8px; opacity: 0.85;
  }

  .tagline-star {
    color: var(--gold-light); font-size: 9px;
    opacity: 0.7; vertical-align: middle;
    text-shadow: 0 0 6px var(--gold-glow);
  }

  /* ── FLOWER OF LIFE — two half-globes, left and right ── */
  .bill-geo-left,
  .bill-geo-right {
    position: absolute;
    top: 50%;
    width: 68%;
    opacity: 0.55;
    pointer-events: none;
    z-index: 1;
  }
  .bill-geo-left  { left: 0;  transform: translate(-50%, -50%); }
  .bill-geo-right { right: 0; transform: translate(50%, -50%); }
  .bill-geo-left svg,
  .bill-geo-right svg { width: 100%; height: auto; display: block; }

  /* ── BILL ANIMATIONS ── */
  @keyframes borderGlow {
    0%   { box-shadow: 0 0 0 2px rgba(212,168,83,0.12), 0 16px 30px rgba(0,0,0,0.85), inset 0 0 28px rgba(212,168,83,0.06); border-color: rgba(212,168,83,0.65); }
    25%  { box-shadow: 0 0 0 3px rgba(212,168,83,0.3), 0 16px 30px rgba(0,0,0,0.85), inset 0 0 36px rgba(212,168,83,0.10); border-color: rgba(236,200,126,0.95); }
    50%  { box-shadow: 0 0 0 2px rgba(212,168,83,0.12), 0 16px 30px rgba(0,0,0,0.85), inset 0 0 28px rgba(212,168,83,0.06); border-color: rgba(212,168,83,0.65); }
    75%  { box-shadow: 0 0 0 3px rgba(212,168,83,0.22), 0 16px 30px rgba(0,0,0,0.85), inset 0 0 32px rgba(212,168,83,0.08); border-color: rgba(222,182,110,0.9); }
    100% { box-shadow: 0 0 0 2px rgba(212,168,83,0.12), 0 16px 30px rgba(0,0,0,0.85), inset 0 0 28px rgba(212,168,83,0.06); border-color: rgba(212,168,83,0.65); }
  }
  @keyframes spendGlow {
    0%   { box-shadow: 0 0 0 2px rgba(212,168,83,0.12), 0 16px 30px rgba(0,0,0,0.85), inset 0 0 28px rgba(212,168,83,0.06); border-color: rgba(212,168,83,0.65); }
    20%  { box-shadow: 0 0 0 8px rgba(212,168,83,0.55), 0 16px 30px rgba(0,0,0,0.85), inset 0 0 60px rgba(212,168,83,0.18); border-color: rgba(240,210,140,1); }
    50%  { box-shadow: 0 0 0 4px rgba(212,168,83,0.3), 0 16px 30px rgba(0,0,0,0.85), inset 0 0 40px rgba(212,168,83,0.12); border-color: rgba(230,195,130,0.95); }
    100% { box-shadow: 0 0 0 2px rgba(212,168,83,0.12), 0 16px 30px rgba(0,0,0,0.85), inset 0 0 28px rgba(212,168,83,0.06); border-color: rgba(212,168,83,0.65); }
  }
  .bill.spending { animation: spendGlow 1.8s ease-out forwards !important; }

  .bill-shimmer {
    position: absolute; inset: 0; border-radius: 10px;
    background: radial-gradient(ellipse 72% 62% at 50% 50%,
      transparent 30%, rgba(15,0,22,0.14) 65%, rgba(15,0,22,0.32) 100%);
    pointer-events: none; z-index: 3;
  }

  .bill-seal {
    width: 32%; height: 1px; margin: 10px auto 0;
    background: linear-gradient(to right,
      transparent 0%,
      rgba(236,200,126,0.5) 20%,
      rgba(255,230,140,0.8) 50%,
      rgba(236,200,126,0.5) 80%,
      transparent 100%);
  }

  /* ── BILL ── */
  .bill-wrapper { perspective: 1000px; margin-bottom: 4px; animation: fadeUp 1s ease 0.2s both; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .bill {
    width: 88%; max-width: 420px; margin: 0 auto; aspect-ratio: 2.5 / 1;
    background: linear-gradient(145deg, #4A0A42 0%, #5E1052 25%, #6A1258 50%, #5E1052 75%, #4A0A42 100%);
    border-radius: 2px; border: 2px solid rgba(212,168,83,0.72);
    box-shadow: 0 0 0 2px rgba(212,168,83,0.12), 0 16px 30px rgba(0,0,0,0.85), inset 0 0 28px rgba(212,168,83,0.06);
    position: relative; overflow: hidden; cursor: pointer;
    transition: transform 0.4s ease; display: block;
    animation: borderGlow 3s ease-in-out infinite;
  }
  .bill:hover {
    box-shadow: 0 0 0 5px rgba(212,168,83,0.28), 0 20px 40px rgba(0,0,0,0.9), inset 0 0 40px rgba(74,0,64,0.3);
  }
  .bill::before {
    content: ''; position: absolute; inset: 7px;
    border: 1px solid rgba(212,168,83,0.35); border-radius: 1px;
    pointer-events: none; z-index: 1;
  }
  .bill::after {
    content: ''; position: absolute; inset: 0;
    background-image:
      repeating-linear-gradient(0deg,  transparent, transparent 4px, rgba(255,255,255,0.018) 4px, rgba(255,255,255,0.018) 5px),
      repeating-linear-gradient(90deg, transparent, transparent 4px, rgba(255,255,255,0.013) 4px, rgba(255,255,255,0.013) 5px);
    border-radius: 2px; pointer-events: none; z-index: 0;
  }
  .bill-content {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 0; z-index: 2;
    padding: 8px 0 4px;
  }

  .bill-amount-star {
    font-size: clamp(9px, 1.8vw, 12px);
    color: rgba(236,200,126,0.75);
    text-shadow: 0 0 10px rgba(212,168,83,0.6);
    align-self: center;
    margin-left: 8px;
    margin-bottom: 0.1em;
  }

  .bill-corner {
    position: absolute;
    font-size: 8px;
    color: rgba(236,200,126,0.5);
    text-shadow: 0 0 6px rgba(212,168,83,0.4);
    z-index: 4;
    line-height: 1;
  }
  .bill-corner-tl { top: 12px;  left: 14px;  }
  .bill-corner-tr { top: 12px;  right: 14px; }
  .bill-corner-bl { bottom: 12px; left: 14px;  }
  .bill-corner-br { bottom: 12px; right: 14px; }

  .bill-tagline-above {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(9px, 2.1vw, 13px);
    letter-spacing: 3px;
    color: var(--gold-light);
    text-transform: uppercase;
    text-shadow: 0 0 14px rgba(0,0,0,1), 0 1px 4px rgba(0,0,0,1), 0 0 28px rgba(0,0,0,0.8);
    margin-top: -22px;
    margin-bottom: 4px;
    padding: 0 18%;
  }

  .bill-denomination {
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    height: clamp(60px, 16vw, 104px);
    margin-top: -6px;
    transition: opacity 0.3s ease;
  }
  .bill-dollar {
    font-family: 'Playfair Display', serif;
    font-size: clamp(34px, 8.5vw, 54px);
    color: var(--gold-light); font-weight: 400;
    text-shadow: 0 0 20px rgba(212,168,83,0.6), 0 0 40px rgba(212,168,83,0.35);
    align-self: center;
    margin-bottom: 0.2em;
    margin-right: 2px;
    opacity: 0.95;
  }
  .bill-number {
    font-family: 'Playfair Display', serif;
    font-size: clamp(62px, 17vw, 108px);
    color: var(--gold-light); font-weight: 600;
    letter-spacing: -1px;
    line-height: 1;
    display: inline-block;
    vertical-align: middle;
    text-shadow:
      0 0 20px rgba(236,200,126,0.95),
      0 0 45px rgba(212,168,83,0.75),
      0 0 80px rgba(212,168,83,0.45),
      0 2px 4px rgba(0,0,0,0.5);
  }

  /* ── DAILY INTENTION ── */
  .intention-section {
    text-align: center; margin-bottom: 8px; margin-top: 32px;
    animation: fadeUp 1s ease 0.28s both;
    padding: 16px 0 8px;
    border-top: 1px solid rgba(212,168,83,0.15);
    border-bottom: 1px solid rgba(212,168,83,0.15);
  }
  .intention-label {
    font-size: 11px; letter-spacing: 4px; text-transform: uppercase;
    color: var(--gold-light); opacity: 1; margin-bottom: 14px;
  }
  .intention-text {
    font-family: 'Cormorant Garamond', serif;

    animation: tadaOnBill 2.2s cubic-bezier(0.34,1.56,0.64,1) forwards;

  @keyframes tadaOnBill {
    0%   { opacity: 0; transform: scale(0.3) rotate(-4deg); }
    18%  { opacity: 1; transform: scale(1.12) rotate(1deg); }
    30%  { transform: scale(0.96) rotate(-0.5deg); }
    42%  { transform: scale(1) rotate(0deg); }
    72%  { opacity: 1; }
    100% { opacity: 0; transform: scale(1.08); }
  }
  .bill-tada-text {
    font-family: 'Cinzel', serif;
    font-size: clamp(38px, 11vw, 66px);
    font-weight: 600;
    color: #ECC87E;
    letter-spacing: 5px;
    text-shadow:
      0 0 20px rgba(212,168,83,1),
      0 0 50px rgba(212,168,83,0.7),
      0 0 90px rgba(212,168,83,0.4),
      0 2px 4px rgba(0,0,0,0.6);
  }

  /* ── GOLDEN DUST ── */
  .coin-burst { position: fixed; pointer-events: none; z-index: 999; }
  .dust {
    position: absolute; border-radius: 50%;
    background: radial-gradient(circle, #F2D890 0%, #D4A853 45%, #A8793A 100%);
    animation: dustFly var(--fly-dur) cubic-bezier(0.25,0.46,0.45,0.94) both;
    box-shadow: 0 0 var(--glow) rgba(212,168,83,0.88);
  }
  @keyframes dustFly {
    0%   { opacity: 1; transform: translate(0,0) scale(1); }
    70%  { opacity: 0.6; }
    100% { opacity: 0; transform: translate(var(--dx),var(--dy)) scale(0.1); }
  }
</style>

<body>

<div class="container">

  <!-- Denomination hint dots -->
  <div class="intention-section">

  <div class="prompt-section">

      <div class="spend-row">
        <textarea class="spend-input" id="spendInput" placeholder="What would you love to spend this on?" rows="3"></textarea>
        <button class="spend-btn" id="spendBtn">Spend it ✦</button>

      <!-- Amount pill -->

<script>
  let spendLog = [];
  let totalSpent = 0;

  function updateTally() {
    const section = document.getElementById('tallySection');
    const list    = document.getElementById('tallyList');
    const total   = document.getElementById('tallyTotal');
    section.style.display = 'block';
    list.innerHTML = spendLog.map((e, i) => `
      <div class="tally-entry" id="entry-${i}">
        <span class="tally-what ${e.what ? '' : 'empty'}" id="what-text-${i}">${e.what || 'something wonderful'}</span>
        <span class="tally-entry-right">
          <button class="tally-edit-btn" data-idx="${i}">✎</button>
          <span class="tally-amount">$${formatAmount(e.amount)}</span>
        </span>
      </div>`).join('');
    // Attach edit listeners (avoids inline onclick + CSP issues)
    list.querySelectorAll('.tally-edit-btn').forEach(btn => {
      btn.addEventListener('click', () => startEdit(parseInt(btn.dataset.idx)));
    });
    total.textContent = '$' + formatAmount(totalSpent);
  }

  function startEdit(i) {
    const textEl  = document.getElementById(`what-text-${i}`);
    const btn     = textEl.nextElementSibling.querySelector('.tally-edit-btn');
    const current = spendLog[i].what || '';
    textEl.innerHTML = `<input class="tally-edit-input" id="edit-input-${i}" placeholder="something wonderful" />`;
    document.getElementById(`edit-input-${i}`).value = current;
    btn.textContent = '✦';
    btn.onclick = null;
    btn.addEventListener('click', () => saveEdit(i), { once: true });
    const inp = document.getElementById(`edit-input-${i}`);
    inp.focus(); inp.select();
    inp.addEventListener('keydown', ev => { if (ev.key === 'Enter') saveEdit(i); });
  }

  function saveEdit(i) {
    const input = document.getElementById(`edit-input-${i}`);
    if (input) spendLog[i].what = input.value.trim();
    updateTally();
  }

  // ── Daily intention ──
  const INTENTIONS = [
    "Money flows to me easily and joyfully.",
    "I am a vibrational match to abundance.",
    "The Universe delights in providing for me.",
    "I receive with grace and appreciation.",
    "Prosperity is my natural state of being.",
    "Every dollar I spend returns multiplied.",
    "I am open to infinite streams of income.",
    "Abundance is always flowing to me.",
    "I welcome financial freedom.",
    "The more I appreciate, the more I receive.",
    "Money is energy and I welcome its flow.",
    "I am aligned with the frequency of wealth.",
    "My desires are valid and always fulfilled.",
    "I trust the Universe to provide for me.",
    "Spending is giving energy permission to flow."
  ];

  function setDailyIntention() {
    const dayNum = Math.floor(Date.now() / 86400000);
    const phrase = INTENTIONS[dayNum % INTENTIONS.length];
    const el = document.getElementById('intentionText');
    if (el) el.textContent = phrase;
  }

  // ── Number formatting ──
  function formatAmount(n) {
    return n >= 1000 ? n.toLocaleString('en-US') : n.toString();
  }

  // ── Amount input — formats commas as you type ──
  function resizeAmountInput() {
    const input = document.getElementById('amountInput');
    input.style.width = Math.max(1, input.value.length) + 'ch';
  }
  function formatAmountInput() {
    const input = document.getElementById('amountInput');
    const raw = input.value.replace(/[^0-9]/g, '');
    if (!raw) { resizeAmountInput(); return; }
    const num = parseInt(raw, 10);
    input.value = num >= 1000 ? num.toLocaleString('en-US') : raw;
    resizeAmountInput();
  }
  document.getElementById('amountInput').addEventListener('input', formatAmountInput);

  // ── Chime — C major arpeggio ──
  function playTaDa() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const notes = [261.63, 329.63, 392.00, 523.25]; // C4 E4 G4 C5
      notes.forEach((freq, i) => {
        const osc  = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.value = freq;
        const t = ctx.currentTime + i * 0.13;
        gain.gain.setValueAtTime(0, t);
        gain.gain.linearRampToValueAtTime(0.16, t + 0.018);
        gain.gain.setValueAtTime(0.16, t + 1.1);
        gain.gain.linearRampToValueAtTime(0, t + 1.8);
        osc.start(t);
        osc.stop(t + 1.9);
      });
    } catch(e) {}
  }

  // ── Share tally ──
  function shareTally() {
    if (!spendLog.length) return;
    const lines = spendLog.map(e =>
      `• ${e.what || 'something wonderful'} — $${formatAmount(e.amount)}`
    ).join('\n');
    const text = `✦ THE ART OF DIVINE ALIGNMENT ✦\n\nCalled into being today:\n\n${lines}\n\nTotal released: $${formatAmount(totalSpent)}\n\n✦ this money always replenishes ✦\ntheartofdivinealignment.com`;
    if (navigator.share) {
      navigator.share({ title: 'Vibrational Wallet', text }).catch(() => {});
    } else {
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.getElementById('shareBtn');
        btn.textContent = '✦ copied to clipboard';
        setTimeout(() => { btn.textContent = '✦ share today\'s abundance'; }, 2200);
      });
    }
  }
  const DEFAULT_AMOUNT = 100;

  // ── Update bill display (scales font for large numbers) ──
  function updateBillDisplay(amount) {
    const numEl = document.querySelector('.bill-number');
    const text  = formatAmount(amount);
    numEl.textContent = text;
    const digits = text.replace(/,/g, '').length;
    numEl.style.fontSize = digits >= 6 ? 'clamp(32px, 8vw, 52px)'
                         : digits >= 5 ? 'clamp(42px, 11vw, 68px)'
                         : '';
  }

  // ── Coin burst ──
  function coinBurst(x, y) {
    const b = document.createElement('div');
    b.className = 'coin-burst';
    b.style.cssText = `left:${x}px;top:${y}px`;
    document.body.appendChild(b);
    for (let i = 0; i < 90; i++) {
      const c = document.createElement('div');
      c.className = 'dust';
      const isBig = i < 16, isMed = i < 36;
      const size = isBig ? (16 + Math.random() * 18) : isMed ? (6 + Math.random() * 8) : (2 + Math.random() * 4);
      const ang = Math.random() * 360, dist = isBig ? (150 + Math.random() * 220) : isMed ? (80 + Math.random() * 160) : (30 + Math.random() * 120);
      const rad = ang * Math.PI / 180, dx = Math.cos(rad) * dist, dy = Math.sin(rad) * dist - Math.abs(Math.sin(rad) * dist * 0.3);
      c.style.cssText = [
        `width:${size.toFixed(1)}px`,
        `height:${size.toFixed(1)}px`,
        `--dx:${dx.toFixed(1)}px`,
        `--dy:${dy.toFixed(1)}px`,
        `--fly-dur:${(1 + Math.random() * 1.2).toFixed(2)}s`,
        `--glow:${isBig ? '8px' : isMed ? '4px' : '2px'}`,
        `animation-delay:${(Math.random() * 0.25).toFixed(2)}s`,
        `opacity:${(0.75 + Math.random() * 0.25).toFixed(2)}`
      ].join(';');
      b.appendChild(c);
    }
    setTimeout(() => b.remove(), 2800);
  }

  // ── Spend button ──
  document.getElementById('spendBtn').addEventListener('click', () => {
    const input = document.getElementById('spendInput');
    const amountInput = document.getElementById('amountInput');
    const spentAmount = parseFloat(amountInput.value.replace(/,/g, '')) || DEFAULT_AMOUNT;
    const spentWhat = input.value.trim();

    // Hide denomination instantly — nothing shows under TADA
    const billAmt = document.getElementById('billAmount');
    billAmt.style.opacity = '0';

    // Log to tally
    spendLog.push({ what: spentWhat, amount: spentAmount });
    totalSpent += spentAmount;
    updateTally();

    // Bill glow
    const bill = document.getElementById('bill');
    bill.classList.remove('spending');
    void bill.offsetWidth;
    bill.classList.add('spending');
    setTimeout(() => bill.classList.remove('spending'), 1900);

    // TADA on bill
    const tadaEl = document.getElementById('billTada');
    tadaEl.classList.remove('show');
    void tadaEl.offsetWidth;
    tadaEl.classList.add('show');
    setTimeout(() => tadaEl.classList.remove('show'), 2300);

    // Coin burst from bill
    const rect = bill.getBoundingClientRect();
    coinBurst(rect.left + rect.width / 2, rect.top + rect.height / 2);

    // Reveal new amount once TADA has cleared
    setTimeout(() => {
      updateBillDisplay(spentAmount);
      const billAmt = document.getElementById('billAmount');
      billAmt.style.transition = 'opacity 0.5s ease';
      billAmt.style.opacity = '1';
      setTimeout(() => { billAmt.style.transition = ''; }, 600);
    }, 2050);

    // TA-DA! fanfare
    playTaDa();
    if (navigator.vibrate) navigator.vibrate([30, 40, 60]);

    // Clear input
    input.value = '';
    if (document.activeElement) document.activeElement.blur();
  });

  // ── Bill tilt on hover ──
  const bill = document.getElementById('bill');
  bill.addEventListener('mousemove', e => {
    const r = bill.getBoundingClientRect();
    bill.style.transform = `rotateX(${((e.clientY - r.top - r.height / 2) / r.height) * -7}deg) rotateY(${((e.clientX - r.left - r.width / 2) / r.width) * 7}deg) scale(1.015)`;
  });
  bill.addEventListener('mouseleave', () => { bill.style.transform = ''; });

  // ── Init ──
  setDailyIntention();
  resizeAmountInput();
  updateBillDisplay(DEFAULT_AMOUNT);
  document.getElementById('shareBtn').addEventListener('click', shareTally);
  document.getElementById('resetBtn').addEventListener('click', () => {
    spendLog = [];
    totalSpent = 0;
    document.getElementById('tallySection').style.display = 'none';
    document.getElementById('tallyList').innerHTML = '';
    document.getElementById('tallyTotal').textContent = '$0';
    const billAmt = document.getElementById('billAmount');
    billAmt.style.opacity = '0';
    setTimeout(() => {
      updateBillDisplay(DEFAULT_AMOUNT);
      document.getElementById('amountInput').value = DEFAULT_AMOUNT;
      resizeAmountInput();
      billAmt.style.opacity = '1';
    }, 200);
  });
</script>

</body>
</html>
